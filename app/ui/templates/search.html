<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search 搜索 - {{ app_name }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">AI 知识管家</div>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/inbox">Inbox 导入</a>
      <a href="/knowledge">Knowledge 知识库</a>
      <a class="active" href="/search">Search 搜索</a>
      <a href="/ask">Ask AI</a>
      <a href="/review">Review 复盘</a>
      <a href="/settings">Settings 设置</a>
    </nav>
  </aside>

  <main class="page">
    <header class="hero compact-hero">
      <div>
        <p class="eyebrow">Search</p>
        <h1>搜索知识库</h1>
        <p>支持混合检索（关键词 + 向量）+ Rerank。</p>
      </div>
      <div class="status-panel">
        <div><span>OpenAI</span><strong class="{{ openai_status_class }}">{{ openai_status }}</strong></div>
        <div><span>当前模式</span><strong>{{ mode_description }}</strong></div>
        <div><span>结果数量</span><strong>{{ result_count }}</strong></div>
      </div>
    </header>

    <section class="panel">
      <div class="panel-heading">
        <h2>搜索条件</h2>
        <p>Auto 模式使用混合搜索（关键词 + 向量）+ Rerank。</p>
      </div>
      <form class="search-form" method="post" action="/search">
        <label class="query-field">
          查询内容
          <input type="search" name="query" value="{{ query }}" placeholder="例如：RAG 优化方法、语义搜索、Agent 记忆">
        </label>
        <label>
          检索模式
          <select name="mode">{{ mode_options }}</select>
        </label>
        <label>
          数量
          <input type="number" name="limit" value="{{ limit }}" min="1" max="20">
        </label>
        <label>
          分类
          <input type="text" name="category" value="{{ category_filter }}" placeholder="如 agent / project">
        </label>
        <label>
          标签
          <input type="text" name="tag" value="{{ tag_filter }}" placeholder="如 rag / memory">
        </label>
        <label>
          人物
          <input type="text" name="person" value="{{ person_filter }}" placeholder="如 张三 / Alice">
        </label>
        <label>
          开始日期
          <input type="date" name="date_from" value="{{ date_from_filter }}">
        </label>
        <label>
          结束日期
          <input type="date" name="date_to" value="{{ date_to_filter }}">
        </label>
        <button type="submit">搜索</button>
      </form>
    </section>

    {{ results_panel }}
    {{ search_history_panel }}
  </main>
</body>
</html>
