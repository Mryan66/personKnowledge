<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ask AI 问答 - {{ app_name }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">AI 知识管家</div>
    <nav>
      <a href="/dashboard">首页</a>
      <a href="/inbox">导入资料</a>
      <a href="/knowledge">知识库</a>
      <a href="/search">搜索</a>
      <a class="active" href="/ask">AI 问答</a>
      <a href="/review">知识复盘</a>
      <a href="/settings">设置</a>
    </nav>
  </aside>

  <main class="page">
    <header class="chat-page-header">
      <div class="chat-page-title">
        <p class="eyebrow">Ask AI</p>
        <h1>AI 问答</h1>
      </div>
      <div class="chat-page-status" id="ask-status-bar">
        {{ chat_status_bar }}
      </div>
    </header>

    <section class="ask-chat-layout">
      <div class="ask-main-column">
        {{ prefill_context_panel }}
        <div id="ask-session-drawer">{{ session_history_drawer }}</div>
        <div id="ask-conversation-region">{{ conversation_panel }}</div>
      </div>
    </section>

    <section class="panel ask-composer-panel">
      <form class="ask-form progress-form" method="post" action="/ask" data-progress-text="正在检索相关知识并组织回答...">
        <input type="hidden" name="session_id" value="{{ session_id }}">
        <input type="hidden" name="session_id_selector" value="{{ session_id }}">
        <input type="hidden" name="answer_style" value="balanced">
        <div class="ask-input-bar">
          <label class="question-field compact-question-field">
            <textarea name="question" rows="3" placeholder="输入你的问题，像聊天一样直接发送...">{{ question }}</textarea>
          </label>
          <button type="submit" data-loading-label="发送中...">发送</button>
        </div>
        <div class="chip-row compact-chip-row" id="quick-prompts">
          <span class="tag-chip" data-prompt="帮我总结最近关于 RAG 的记录">最近的 RAG</span>
          <span class="tag-chip" data-prompt="我之前对 Agent 的核心理解是什么？">Agent 理解</span>
          <span class="tag-chip" data-prompt="这些资料里下一步最值得补什么？">下一步</span>
        </div>
        <details class="advanced-settings">
          <summary>高级设置</summary>
          <div class="ask-options">
            <label>
              回答风格
              <select name="answer_style">{{ answer_style_options }}</select>
            </label>
            <label>
              对话会话
              <select name="session_id_selector">{{ session_options }}</select>
            </label>
            <label>
              理解方式
              <select name="search_mode">{{ search_mode_options }}</select>
            </label>
            <label>
              引用数量
              <input type="number" name="limit" value="{{ limit }}" min="1" max="10">
            </label>
            <label>
              模型
              <input type="text" name="model" value="{{ model }}">
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="use_llm" value="1" {{ use_llm_checked }}>
              使用 AI 生成回答
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="use_embeddings" value="1" {{ use_embeddings_checked }}>
              语义理解增强（推荐）
            </label>
          </div>
        </details>
      </form>
    </section>

    <div id="ask-answer-region">{{ answer_panel }}</div>
  </main>

<script>
(function() {
  const prompts = document.getElementById('quick-prompts');
  const textarea = document.querySelector('textarea[name="question"]');
  const form = document.querySelector('.progress-form');
  const liveRegion = document.querySelector('[data-live-region]');
  const resultPanel = document.querySelector('[data-result-panel]');
  const conversationRegion = document.getElementById('ask-conversation-region');
  const answerRegion = document.getElementById('ask-answer-region');
  const sessionDrawerRegion = document.getElementById('ask-session-drawer');
  const statusBarRegion = document.getElementById('ask-status-bar');
  if (!prompts || !textarea) return;

  prompts.addEventListener('click', function(e) {
    const chip = e.target.closest('[data-prompt]');
    if (!chip) return;
    textarea.value = chip.getAttribute('data-prompt');
    textarea.focus();
    textarea.scrollTop = textarea.scrollHeight;
  });

  if (form) {
    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      const button = form.querySelector('button[type="submit"]');
      let loadingPanel = document.getElementById('ask-loading-panel');
      const question = textarea.value.trim();
      if (!question) return;
      if (button) {
        button.disabled = true;
        button.textContent = button.getAttribute('data-loading-label') || '正在处理中...';
      }
      if (liveRegion) {
        liveRegion.textContent = form.getAttribute('data-progress-text') || '正在检索相关知识并组织回答...';
      }
      if (!loadingPanel) {
        loadingPanel = document.createElement('section');
        loadingPanel.id = 'ask-loading-panel';
        loadingPanel.className = 'panel loading-panel';
        loadingPanel.innerHTML = '<div class="panel-heading"><h2>知识助手正在处理</h2><p>先检索资料，再组织回答。</p></div><div class="loading-steps"><span>正在检索相关知识...</span><span>正在组织回答...</span><span>正在生成最终回答...</span></div>';
        form.closest('.page').querySelector('.ask-main-column')?.prepend(loadingPanel);
      }
      try {
        const response = await fetch('/ask', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
            'X-Requested-With': 'fetch'
          },
          body: new URLSearchParams(new FormData(form)).toString()
        });
        if (!response.ok) {
          form.submit();
          return;
        }
        const payload = await response.json();
        if (statusBarRegion) statusBarRegion.innerHTML = payload.fragments.chat_status_bar || '';
        if (sessionDrawerRegion) sessionDrawerRegion.innerHTML = payload.fragments.session_history_drawer || '';
        if (conversationRegion) conversationRegion.innerHTML = payload.fragments.conversation_panel || '';
        if (answerRegion) answerRegion.innerHTML = payload.fragments.answer_panel || '';
        const sessionIdField = form.querySelector('input[name="session_id"]');
        const sessionSelectorHidden = form.querySelector('input[name="session_id_selector"]');
        if (sessionIdField) sessionIdField.value = payload.session_id || '';
        if (sessionSelectorHidden) sessionSelectorHidden.value = payload.session_id || '';
        textarea.value = '';
        const chatThread = document.querySelector('.chat-thread');
        if (chatThread) {
          chatThread.scrollTop = chatThread.scrollHeight;
        }
        const updatedResultPanel = document.querySelector('[data-result-panel]');
        if (updatedResultPanel) {
          updatedResultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      } catch (error) {
        form.submit();
        return;
      } finally {
        if (loadingPanel) loadingPanel.remove();
        if (button) {
          button.disabled = false;
          button.textContent = '发送';
        }
      }
    });
  }

  const chatThread = document.querySelector('.chat-thread');
  if (chatThread) {
    chatThread.scrollTop = chatThread.scrollHeight;
  }
})();
</script>
</body>
</html>
